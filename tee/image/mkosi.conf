# Tacet TEE Image Configuration
# Minimal image: Ubuntu Noble + vLLM for inference
#
# Phase 1: Simple bootable image, no dm-verity, no attestation
# dm-verity and reproducibility hardening come in Step 9

[Output]
ImageId=tacet
ImageVersion=0.1.0
Format=disk
ManifestFormat=json

[Distribution]
Distribution=ubuntu
Release=noble
Repositories=

[Content]
Bootable=yes
Bootloader=systemd-boot

# Kernel command line (dm-verity roothash will be added in Step 9)
KernelCommandLine=console=ttyS0

Packages=
    systemd
    systemd-boot-efi
    udev
    dbus
    ca-certificates
    python3
    python3-pip
    python3-venv
    python3-dev
    build-essential
    curl
    wget
    iproute2
    iputils-ping
    kmod
    linux-image-virtual
    vim
    less
    htop
    net-tools
    libnuma1
    nodejs

Autologin=yes
Locale=C.UTF-8
Keymap=us

PackageManagerTrees=mkosi.pkgmngr
SkeletonTrees=mkosi.skeleton
ExtraTrees=mkosi.extra

[Build]
CacheDirectory=mkosi.cache
Incremental=yes
WithNetwork=yes
